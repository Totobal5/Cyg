name: release

on:
  push:
    tags:
      - "[0-9]*.[0-9]*"
      - "[0-9]*.[0-9]*.[0-9]*"
      - "v[0-9]*.[0-9]*"
      - "v[0-9]*.[0-9]*.[0-9]*"

permissions:
  contents: write
  issues: read
  pull-requests: read

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v5
        with:
          node-version: "20"

      - name: Release GameMaker Package
        uses: tinkerer-red/release-actions@v1
        with:
          project-file: "Cyg.yyp"
          package-id: "Cyg"
          include-folders: "Cyg"
          package-name: "Cyg"
          package-publisher: "Totobal"
          append-version-to-filename: "true"
          auto-generate-description: "true"
          include-issues-in-description: "true"
          include-commits-in-description: "true"
          project-tool-version: "2024.14.160"
          gmpm-registry: "https://gmpm.gamemaker.io"